<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
      .accent { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 14; ry: 14; }
      .artifact { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 14; ry: 14; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="44" class="title">RepoPilot Architecture</text>

  <rect x="40" y="90" width="170" height="74" class="accent" />
  <text x="70" y="125" class="label">User Task</text>
  <text x="70" y="147" class="text">repo path + task + mode</text>

  <rect x="250" y="90" width="170" height="74" class="box" />
  <text x="305" y="125" class="label">Planner</text>
  <text x="275" y="147" class="text">task type + workflow</text>

  <rect x="460" y="90" width="190" height="74" class="box" />
  <text x="505" y="125" class="label">Codebase Analyst</text>
  <text x="490" y="147" class="text">grounded repo evidence</text>

  <rect x="690" y="90" width="210" height="74" class="box" />
  <text x="730" y="125" class="label">Implementation Planner</text>
  <text x="722" y="147" class="text">minimal file-scoped plan</text>

  <rect x="460" y="240" width="180" height="86" class="accent" />
  <text x="512" y="274" class="label">Tool Layer</text>
  <text x="482" y="297" class="text">list_files / search_code</text>
  <text x="475" y="317" class="text">read_file / read_file_chunk</text>
  <text x="517" y="337" class="text">write_note</text>

  <rect x="250" y="390" width="220" height="88" class="artifact" />
  <text x="310" y="425" class="label">Run State</text>
  <text x="284" y="448" class="text">agent outputs, inspected files,</text>
  <text x="310" y="468" class="text">tool history, final output</text>

  <rect x="700" y="240" width="150" height="86" class="box" />
  <text x="738" y="276" class="label">Reviewer</text>
  <text x="724" y="298" class="text">coherence + grounding</text>
  <text x="728" y="318" class="text">final assessment</text>

  <rect x="880" y="240" width="120" height="86" class="accent" />
  <text x="905" y="276" class="label">Final Output</text>
  <text x="905" y="298" class="text">CLI result</text>
  <text x="896" y="318" class="text">task-aware summary</text>

  <rect x="700" y="390" width="270" height="88" class="artifact" />
  <text x="770" y="425" class="label">Run Artifacts</text>
  <text x="732" y="448" class="text">input.json / trace.json / summary.md</text>
  <text x="750" y="468" class="text">final_output.json / notes.md</text>

  <path d="M210 127 L250 127" class="arrow" />
  <path d="M420 127 L460 127" class="arrow" />
  <path d="M650 127 L690 127" class="arrow" />
  <path d="M795 164 L795 240" class="arrow" />
  <path d="M850 283 L880 283" class="arrow" />
  <path d="M555 164 L555 240" class="arrow" />
  <path d="M340 164 L340 390" class="arrow" />
  <path d="M555 326 L430 390" class="arrow" />
  <path d="M770 326 L770 390" class="arrow" />
  <path d="M470 434 L700 434" class="arrow" />
</svg>
